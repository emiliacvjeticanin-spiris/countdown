<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Spiris Spring Meetup</title>
    <style>
        body {
            /* Din gradient baserad på dina färger */
            background: transparent;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #555; /* Mjukare textfärg för att passa pastellerna */
            text-align: center;
            overflow: hidden; /* Förhindrar rullningslister om fönstret blir litet */
        }
        .container {
            background: rgba(255, 255, 255, 0.4);
            padding: 5vw; /* Responsiv padding */
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 90%; /* Förhindrar att containern blir för bred */
        }
        h1 { 
            /* Responsiv rubrikstorlek */
            font-size: 3vw; 
            margin-bottom: 20px; 
            color: #333; 
        }
        #timer { 
            /* Responsiv storlek på nedräkningen */
            font-size: 8vw; 
            font-weight: bold; 
            color: #333; 
        }
        /* Media query för ännu mindre skärmar (t.ex. mobiler) */
        @media (max-width: 600px) {
            h1 { font-size: 6vw; }
            #timer { font-size: 12vw; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">Laddar...</div>
</div>

<script>
    // Nedräkning till fredag 6 mars 2026 kl 13:00
    const countDownDate = new Date("Mar 6, 2026 13:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = days + "d " + hours + "h " 
        + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("timer").innerHTML = "NU KÖR VI!";
        }
    }, 1000);
</script>

</body>
</html>
