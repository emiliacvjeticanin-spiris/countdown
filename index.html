<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Spring Meetup</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8e063, #f6d365);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        #timer { font-size: 4rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Spring Meetup börjar om:</h1>
    <div id="timer">Laddar...</div>
</div>

<script>
    // Sätt datumet till fredag 6 mars 2026 kl 13:00
    const countDownDate = new Date("Mar 6, 2026 13:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = days + "d " + hours + "h " 
        + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("timer").innerHTML = "NU KÖR VI!";
        }
    }, 1000);
</script>

</body>
</html>
