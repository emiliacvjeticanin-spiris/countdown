
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Spring Meetup</title>
    <style>
        body {
            /* Din nya gradient baserad på dina färger */
            background: linear-gradient(180deg, #F2B3FF 0%, #FFE9E8 50%, #FFD2D1 100%);
            font-family: 'inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #555; /* Mjukare textfärg för att passa pastellerna */
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: #333; }
        #timer { font-size: 5rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">

    <div id="timer">Laddar...</div>
</div>

<script>
    // Nedräkning till fredag 6 mars 2026 kl 13:00
    const countDownDate = new Date("Mar 6, 2026 13:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = days + "d " + hours + "h " 
        + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("timer").innerHTML = "NU KÖR VI!";
        }
    }, 1000);
</script>

</body>
</html>
