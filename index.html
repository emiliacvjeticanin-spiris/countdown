<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Countdown Spiris Spring Meetup</title>
    <style>
        body {
            background: transparent;
            font-family: sans-serif;
            margin-top: 300px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.5);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        #timer { font-size: 40px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">Laddar...</div>
</div>

<script>
    const countDownDate = new Date("Mar 6, 2026 13:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = days + "d " + hours + "h " 
        + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("timer").innerHTML = "NU KÖR VI!";
        }
    }, 1000);
</script>

</body>
</html>
